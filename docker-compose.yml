services:
  bruno-bot:
    image: ghcr.io/snomf/brown-verification:latest
    container_name: bruno-bot
    restart: always
    env_file: .env
    # Individual environment variables listed above for reference, now handled by env_file
    # environment:
    #   - SUPABASE_URL=${SUPABASE_URL}
    #   ...

    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30 --cleanup --label-enable
